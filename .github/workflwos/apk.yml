name: Android CI & Telegram Upload

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build libcore
      run: |
        # تثبيت gomobile و gobind
        go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.6
        go install github.com/sagernet/gomobile/cmd/gobind@v0.1.6
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init
        
        # بناء libcore.aar
        cd libcore
        chmod +x build.sh
        ./build.sh

    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Find and Prepare APKs
      id: find_apk
      run: |
        # البحث عن ملفات APK الناتجة
        # بناءً على Helpers.kt، الملفات تسمى husi-VERSION-ABI-debug.apk
        # وتوجد في app/build/outputs/apk/{foss,play}/debug
        
        echo "Listing all APK files found:"
        find app/build/outputs/apk -name "*.apk"
        
        # اختيار نسخة arm64-v8a من نكهة play كنسخة افتراضية للرفع
        APK_FILE=$(find app/build/outputs/apk/play/debug -name "*arm64-v8a*.apk" -type f | head -n 1)
        
        if [ -z "$APK_FILE" ]; then
          APK_FILE=$(find app/build/outputs/apk -name "*.apk" -type f | head -n 1)
        fi

        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found!"
          exit 1
        fi
        
        echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_FILE"

    - name: Upload APK to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: 6043381707
        token: 7980809520:AAG9it72WCnR7z7pI8YME79xg_DYe2_-0WE
        document: ${{ steps.find_apk.outputs.apk_path }}
        message: | 
          🚀 تم بناء نسخة APK بنجاح!
          
          📦 التطبيق: Rvpn (Husi)
          🛠 الفرع: ${{ github.ref_name }}
          📝 الالتزام: ${{ github.sha }}
          👤 بواسطة: ${{ github.actor }}
          
          📂 الملف المرفوع: ${{ steps.find_apk.outputs.apk_path }}
          ⚠️ ملاحظة: تم استخدام نسخة Debug لضمان التوافق.
